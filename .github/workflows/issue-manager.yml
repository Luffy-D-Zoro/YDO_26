name: Issue Assignment Manager

on:
  issues:
    types: [assigned]
  issue_comment:
    types: [created]

concurrency:
  group: issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  manage-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
    steps:
      - name: Process Issue Automation
        uses: actions/github-script@v7
        with:
          script: |
            const { eventName, payload } = context;

            // -------------------------------------------------------------
            // EVENT: Manual Assignment via GitHub UI
            // -------------------------------------------------------------
            if (eventName === 'issues' && payload.action === 'assigned') {
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: payload.issue.number,
                  labels: ['contribution in progress']
                });
              } catch (e) {
                if (e.status !== 422 && e.status !== 404) throw e;
                console.log('Label missing or invalid; skipping label assignment.');
              }
              return;
            }

            // -------------------------------------------------------------
            // EVENT: New Comment Created
            // -------------------------------------------------------------
            if (eventName === 'issue_comment' && payload.action === 'created') {
              // Ignore bot comments and comments on Pull Requests
              if (payload.comment.user.type === 'Bot') return;
              if (payload.issue.pull_request) return;

              const commentBody = payload.comment.body;
              const isRequestingAssignment = /^\/assign(\s|$)/i.test(commentBody.trim());

              // Exit early if the command isn't /assign
              if (!isRequestingAssignment) return;

              const issue = payload.issue;
              const commenter = payload.comment.user.login;
              
              // Verify Maintainer Status
              let isMaintainer = ['OWNER', 'MEMBER'].includes(payload.comment.author_association);
              
              // If they are a standard collaborator, do a strict check for write access
              if (!isMaintainer && payload.comment.author_association === 'COLLABORATOR') {
                try {
                  const { data: membership } = await github.rest.repos.getCollaboratorPermissionLevel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    username: commenter
                  });
                  isMaintainer = ['admin', 'write'].includes(membership.permission);
                } catch (e) {
                  console.error('Failed to verify collaborator permissions:', e);
                }
              }

              // -------------------------------------------------------------
              // COMMAND: /assign (The Automated Bouncer)
              // -------------------------------------------------------------
              
              // Acknowledge the command was seen
              try {
                await github.rest.reactions.createForIssueComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: payload.comment.id,
                  content: 'eyes'
                });
              } catch (e) {
                console.log('Failed to add reaction:', e);
              }

              // Bouncer Check 1: Is it already assigned? (Fetch fresh state to prevent race conditions)
              const { data: freshIssue } = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number
              });

              if (freshIssue.assignees.length > 0) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `@${commenter} Thanks for your interest! However, this issue is already assigned and in progress. Please look for an unassigned issue to work on.`
                });
                return;
              }

              // Bouncer Check 2: Does the user have too many issues? (Maintainers bypass this)
              if (!isMaintainer) {
                let issuesOnly;
                try {
                  const allOpen = await github.paginate(github.rest.issues.listForRepo, {
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    assignee: commenter,
                    state: 'open',
                    per_page: 100
                  });
                  issuesOnly = allOpen.filter(i => !i.pull_request);
                } catch (e) {
                  console.error('Failed to fetch assignee issues:', e);
                  return;
                }

                if (issuesOnly.length >= 2) {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    body: `@${commenter} You are currently assigned to ${issuesOnly.length} open issues. You can only work on a maximum of 2 issues at a time. Please complete your current tasks before requesting new ones!`
                  });
                  return;
                }
              }

              // Log the valid request for a maintainer to review
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `@${commenter} Your request has been logged! A maintainer will review the requests and assign this issue manually.`
              });
            }
